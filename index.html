<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Quantum Analytics | Dashboard</title>
    <meta name="description" content="Dashboard de Análise de E-commerce. Um projeto de portfólio front-end focado em performance, acessibilidade e boas práticas.">
    <meta name="author" content="Ricardo Fiorini Cuato"> <meta name="theme-color" content="#1a202c"> <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' https://cdn.jsdelivr.net; 
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; 
        font-src 'self' https://cdnjs.cloudflare.com; 
        img-src 'self' https://via.placeholder.com https://ui-avatars.com;
        connect-src 'self';">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://ui-avatars.com" crossorigin>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <aside id="sidebar" class="sidebar" aria-label="Navegação Principal">
        <header class="sidebar-header">
            <a href="#" class="logo-link" aria-label="Quantum Analytics - Página Inicial">
                <i class="fa-solid fa-chart-line logo-icon" aria-hidden="true"></i>
                <h1 class="logo-text">Quantum</h1>
            </a>
        </header>
        
        <nav class="sidebar-nav">
            <h2 id="nav-heading" class="visually-hidden">Menu de Navegação</h2>
            <ul aria-labelledby="nav-heading">
                <li>
                    <a href="#" class="nav-link" data-page="dashboard" aria-current="page">
                        <i class="fa-solid fa-house nav-icon" aria-hidden="true"></i>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="sales">
                        <i class="fa-solid fa-sack-dollar nav-icon" aria-hidden="true"></i>
                        <span class="nav-text">Análise de Vendas</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="products">
                        <i class="fa-solid fa-box-archive nav-icon" aria-hidden="true"></i>
                        <span class="nav-text">Produtos</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="customers">
                        <i class="fa-solid fa-users nav-icon" aria-hidden="true"></i>
                        <span class="nav-text">Clientes</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="settings">
                        <i class="fa-solid fa-gear nav-icon" aria-hidden="true"></i>
                        <span class="nav-text">Configurações</span>
                    </a>
                </li>
            </ul>
        </nav>

        <footer class="sidebar-footer">
             <a href="#" class="nav-link logout">
                <i class="fa-solid fa-right-from-bracket nav-icon" aria-hidden="true"></i>
                <span class="nav-text">Sair</span>
            </a>
        </footer>
    </aside>

    <div class="main-wrapper">
        <header class="header" role="banner">
            <div class="header-left">
                <button class="sidebar-toggle" id="sidebar-toggle" aria-controls="sidebar" aria-expanded="false" aria-label="Abrir ou fechar menu de navegação">
                    <i class="fa-solid fa-bars" aria-hidden="true"></i>
                </button>
                <form role="search" class="search-form">
                    <label for="search-input" class="visually-hidden">Pesquisar</label>
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                        <input type="search" id="search-input" placeholder="Pesquisar...">
                    </div>
                </form>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="theme-toggle" aria-label="Ativar tema escuro" aria-live="polite">
                    <i class="fa-regular fa-sun" aria-hidden="true"></i>
                </button>
                <div class="user-profile">
                    <button class="user-menu-toggle" aria-label="Menu do usuário">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Avatar do usuário" class="user-avatar">
                        <span class="user-name" aria-hidden="true">Admin</span>
                        <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
                    </button>
                    </div>
            </div>
        </header>

        <main id="main-content" class="content" tabindex="-1" role="region" aria-label="Conteúdo Principal">
            <div role="status" class="loading-state">
                <p>Carregando Dashboard...</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>
